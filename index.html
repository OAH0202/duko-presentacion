function useWindowSize(){
  const[size,setSize]=useState({w:window.innerWidth,h:window.innerHeight});
  useEffect(()=>{const fn=()=>setSize({w:window.innerWidth,h:window.innerHeight});window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn);},[]);
  return size;
}

function Lbl({text,m}){
  return h("div",{style:{fontFamily:"monospace",fontSize:m?9:11,letterSpacing:3,textTransform:"uppercase",color:ACCENT,marginBottom:m?8:14}},`// ${text}`);
}

function Card({children,style={}}){

    h("div",{style:{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${ACCENT},${ACCENT2})`}}),
    children
  );
}

function S_Portfolio({m}){
  var act=React.useState(null);
  var active=act[0];
  var setActive=act[1];
  var cols=m?4:5;
  var gridCols="repeat("+cols+",1fr)";
  return h("div",{style:{maxWidth:960,width:"100%"}},
    h(Lbl,{text:"Nuestros trabajos",m:m}),
    h("div",{style:{fontFamily:"'Bebas Neue',Georgia,serif",fontSize:m?"clamp(28px,8vw,42px)":"clamp(36px,4.5vw,54px)",fontWeight:900,lineHeight:1,letterSpacing:2,marginBottom:m?10:16}},"PORTAFOLIO"),
    h("div",{style:{display:"grid",gridTemplateColumns:gridCols,gap:m?5:8,width:"100%",maxHeight:m?"48vh":"62vh",overflowY:"auto",paddingRight:4}},
      PORTFOLIO.map(function(item,i){
        return h("div",{
          key:i,
          onClick:function(){setActive(active===i?null:i);},
          style:{position:"relative",borderRadius:8,overflow:"hidden",cursor:"pointer",
            border:active===i?"2px solid #E8383A":"1px solid rgba(232,56,58,0.2)",
            background:"#141420",paddingBottom:"100%",transition:"transform 0.2s,border 0.2s",
            transform:active===i?"scale(1.04)":"scale(1)"}
        },
          h("div",{style:{position:"absolute",top:0,left:0,right:0,bottom:0}},
            item.img
              ? h("img",{src:item.img,style:{width:"100%",height:"100%",objectFit:"cover",display:"block"}})
              : h("div",{style:{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:m?10:12,color:"#8A8A9A",textAlign:"center",padding:4}},"ACM"),
            h("div",{style:{position:"absolute",bottom:0,left:0,right:0,
              background:"linear-gradient(to top,rgba(13,13,20,0.95) 0%,transparent 100%)",
              padding:m?"3px 4px":"5px 7px",fontSize:m?7:8,fontWeight:600,color:"#F0EDE8",
              letterSpacing:0.4,lineHeight:1.2,textTransform:"uppercase"}},item.name)
          )
        );
      })
    ),
    active!==null ? h("div",{
      style:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(13,13,20,0.97)",zIndex:9999,
        display:"flex",alignItems:"center",justifyContent:"center",
        flexDirection:"column",gap:16,padding:m?16:32},
      onClick:function(){setActive(null);}
    },
      PORTFOLIO[active].img
        ? h("img",{src:PORTFOLIO[active].img,style:{maxWidth:"88vw",maxHeight:m?"68vh":"78vh",objectFit:"contain",borderRadius:10,boxShadow:"0 0 80px rgba(232,56,58,0.25)"}})
        : h("div",{style:{fontSize:40,color:"#8A8A9A"}},"ACM"),
      h("div",{style:{fontFamily:"'Bebas Neue',serif",fontSize:m?22:30,letterSpacing:3,color:"#F0EDE8",textAlign:"center",marginTop:8}},PORTFOLIO[active].name),
      h("div",{style:{fontSize:m?10:11,color:"#8A8A9A",letterSpacing:3,marginTop:4}},"TOCA PARA CERRAR")
    ) : null
  );
}

const SLIDES=[S1,S2,S3,S4,S5,S_Portfolio,S6];
const TOTAL=SLIDES.length;

function App(){
  const[current,setCurrent]=useState(0);
  const[visible,setVisible]=useState(0);
  const[fading,setFading]=useState(false);
  const{w}=useWindowSize();
  const m=w<640;
  const txRef=useRef(null);

  const goTo=useCallback((n)=>{
    if(fading)return;
    const next=((n%TOTAL)+TOTAL)%TOTAL;
    if(next===current)return;
    setFading(true);
    setTimeout(()=>{setCurrent(next);setVisible(next);setFading(false);},280);
  },[current,fading]);

  useEffect(()=>{
    const fn=(e)=>{
      if(e.key==="ArrowRight"||e.key===" ")goTo(current+1);
      if(e.key==="ArrowLeft")goTo(current-1);
    };
    window.addEventListener("keydown",fn);
    return()=>window.removeEventListener("keydown",fn);
  },[current,goTo]);

  const SlideComp=SLIDES[visible];

  return h("div",{
    style:{width:"100vw",height:"100vh",background:DARK,color:WHITE,position:"relative",overflow:"hidden",fontFamily:"'DM Sans','Segoe UI',sans-serif"},
    onTouchStart:(e)=>{txRef.current=e.touches[0].clientX;},
    onTouchEnd:(e)=>{
      if(txRef.current===null)return;
      const dx=e.changedTouches[0].clientX-txRef.current;
      if(Math.abs(dx)>40){dx<0?goTo(current+1):goTo(current-1);}
      txRef.current=null;
    }
  },
    h("div",{style:{position:"fixed",top:0,left:0,height:3,zIndex:200,background:`linear-gradient(90deg,${ACCENT},${ACCENT2})`,width:`${((current+1)/TOTAL)*100}%`,transition:"width 0.5s ease"}}),
    h("div",{style:{
      position:"absolute",inset:0,zIndex:10,
      display:"flex",alignItems:"center",justifyContent:"center",
      padding:m?"12px 12px 100px":"28px 48px 80px",
      overflowY:"auto",
      opacity:fading?0:1,
      transform:fading?"translateY(10px)":"translateY(0)",
      transition:"opacity 0.28s ease,transform 0.28s ease",
    }},h(SlideComp,{m})),
    h("div",{style:{
      position:"fixed",bottom:m?10:18,left:"50%",transform:"translateX(-50%)",
      display:"flex",alignItems:"center",gap:m?8:12,zIndex:200,
      background:"rgba(13,13,20,0.92)",backdropFilter:"blur(20px)",
      border:`1px solid ${BORDER}`,borderRadius:50,
      padding:m?"7px 14px":"9px 20px",
    }},
      h("button",{onClick:()=>goTo(current-1),style:{width:m?28:34,height:m?28:34,borderRadius:"50%",border:`1.5px solid ${BORDER}`,background:"transparent",color:WHITE,fontSize:m?12:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}},"←"),
      h("div",{style:{display:"flex",gap:5,alignItems:"center"}},
        ...Array.from({length:TOTAL},(_,i)=>h("div",{key:i,onClick:()=>goTo(i),style:{height:5,borderRadius:3,cursor:"pointer",background:i===current?ACCENT:GRAY,width:i===current?16:5,transition:"all 0.3s"}}))
      ),
      h("div",{style:{fontFamily:"monospace",fontSize:m?10:11,color:GRAY,letterSpacing:1,minWidth:28,textAlign:"center"}},`${current+1}/${TOTAL}`),
      h("button",{onClick:()=>goTo(current+1),style:{width:m?28:34,height:m?28:34,borderRadius:"50%",border:`1.5px solid ${BORDER}`,background:"transparent",color:WHITE,fontSize:m?12:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}},"→")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
