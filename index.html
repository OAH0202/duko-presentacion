<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Duko Láser — Presentación</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{width:100%;height:100%;overflow:hidden;background:#0D0D14}
  body{font-family:'DM Sans','Segoe UI',sans-serif;color:#F0EDE8}
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useCallback } = React;
const h = React.createElement;

const DARK = "#0D0D14", ACCENT = "#E8383A", ACCENT2 = "#FF6B35";
const CARD = "#141420", GRAY = "#8A8A9A", WHITE = "#F0EDE8";
const BORDER = "rgba(232,56,58,0.25)";

const services = [
  { icon: "🏗️", title: "Rotulación Arquitectónica", desc: "Rótulos de fachada, letras volumétricas y señalética exterior para plazas y centros comerciales." },
  { icon: "✂️", title: "Corte y Grabado Láser", desc: "Precisión milimétrica en acrílico, madera, metal y materiales especiales para cualquier superficie." },
  { icon: "🖨️", title: "Impresión Directa", desc: "Impresión a todo color sobre superficies rígidas. Resolución fotográfica y acabados duraderos." },
  { icon: "🗺️", title: "Señalética Interior", desc: "Directorios, numeración de locales, mapas de plaza y señalización de emergencia." },
  { icon: "🎁", title: "Regalos Corporativos", desc: "Artículos personalizados y grabados para empresas. Distribuidores oficiales TRODAT." },
  { icon: "🔖", title: "Sellos y Papelería", desc: "Sellos automáticos de alta calidad para oficinas administrativas y locales comerciales." },
];

const reasons = [
  { num: "01", title: "Empresa hondureña — sin intermediarios", desc: "Fabricamos directamente en Honduras. Tiempos más cortos, precios más competitivos y comunicación directa con el equipo de producción." },
  { num: "02", title: "Desde la planificación hasta la entrega", desc: "Trabajamos contigo desde la etapa de diseño. Cuanto antes nos integramos al proyecto, mejor el resultado." },
  { num: "03", title: "Portafolio comercial probado", desc: "Hemos trabajado con plazas, restaurantes, urbanizaciones y empresas a nivel nacional. Conocemos las necesidades de los desarrollos comerciales." },
];

const stats = [
  { num: "3K+", label: "Proyectos realizados" },
  { num: "100%", label: "Fabricación nacional" },
  { num: "SPS", label: "San Pedro Sula, HN" },
  { num: "24/7", label: "Soporte al cliente" },
];

function Label({ text }) {
  return h("div", {
    style: { fontFamily: "monospace", fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: ACCENT, marginBottom: 14 }
  }, `// ${text}`);
}

function BigTitle({ children }) {
  return h("div", {
    style: { fontFamily: "'Bebas Neue', Georgia, serif", fontSize: "clamp(42px,6vw,70px)", fontWeight: 900, lineHeight: 1.05, letterSpacing: 2, marginBottom: 20, whiteSpace: "pre-line" }
  }, children);
}

function Slide1() {
  return h("div", { style: { textAlign: "center", maxWidth: 700, position: "relative" } },
    h("div", { style: { position: "absolute", width: 500, height: 500, borderRadius: "50%", background: "radial-gradient(circle, rgba(232,56,58,0.12) 0%, transparent 70%)", top: "50%", left: "50%", transform: "translate(-50%,-50%)", zIndex: 0, pointerEvents: "none" } }),
    h("div", { style: { width: 2, height: 60, background: `linear-gradient(to bottom, transparent, ${ACCENT}, transparent)`, margin: "0 auto 28px", animation: "pulseLine 2s ease-in-out infinite" } }),
    h("div", {
      style: {
        fontFamily: "'Bebas Neue', Georgia, serif", fontSize: "clamp(72px,12vw,130px)", fontWeight: 900,
        lineHeight: 0.9, letterSpacing: 4,
        background: `linear-gradient(135deg, ${WHITE} 40%, ${ACCENT} 100%)`,
        WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text",
        position: "relative", zIndex: 1,
      }
    }, "DUKO", h("br"), "LÁSER"),
    h("div", { style: { width: 60, height: 3, background: ACCENT, margin: "24px auto", borderRadius: 2 } }),
    h("div", { style: { fontSize: 12, letterSpacing: 5, textTransform: "uppercase", color: GRAY, fontWeight: 500 } }, "Fabricantes Hondureños · Rotulación Corporativa"),
    h("div", { style: { fontSize: 14, color: GRAY, lineHeight: 1.7, marginTop: 16 } }, "Transformamos espacios en marcas.", h("br"), "Cada rótulo, una primera impresión.")
  );
}

function Slide2() {
  return h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 60, maxWidth: 860, alignItems: "center" } },
    h("div", null,
      h(Label, { text: "Quiénes somos" }),
      h(BigTitle, null, "EMPRESA\nHONDUREÑA"),
      h("p", { style: { fontSize: 14, lineHeight: 1.8, color: GRAY } },
        "Fabricantes nacionales especializados en rotulación arquitectónica, grabado láser y señalética de alto impacto para proyectos comerciales, plazas y centros empresariales.")
    ),
    h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 } },
      ...stats.map((s, i) =>
        h("div", { key: i, style: { background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: "20px 16px", position: "relative", overflow: "hidden" } },
          h("div", { style: { position: "absolute", top: 0, left: 0, right: 0, height: 2, background: `linear-gradient(90deg, ${ACCENT}, ${ACCENT2})` } }),
          h("div", { style: { fontFamily: "'Bebas Neue', serif", fontSize: 40, fontWeight: 900, color: ACCENT, lineHeight: 1 } }, s.num),
          h("div", { style: { fontSize: 10, color: GRAY, marginTop: 4, textTransform: "uppercase", letterSpacing: 1 } }, s.label)
        )
      )
    )
  );
}

function Slide3() {
  return h("div", { style: { maxWidth: 900, width: "100%" } },
    h(Label, { text: "Lo que hacemos" }),
    h(BigTitle, null, "NUESTROS SERVICIOS"),
    h("div", { style: { display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14, marginTop: 8 } },
      ...services.map((s, i) =>
        h("div", { key: i, style: { background: CARD, border: `1px solid ${BORDER}`, borderRadius: 14, padding: 20, position: "relative", overflow: "hidden" } },
          h("div", { style: { fontSize: 26, marginBottom: 12 } }, s.icon),
          h("div", { style: { fontSize: 13, fontWeight: 700, marginBottom: 6 } }, s.title),
          h("div", { style: { fontSize: 11, color: GRAY, lineHeight: 1.6 } }, s.desc),
          h("div", { style: { position: "absolute", bottom: 0, right: 0, width: 36, height: 36, background: "linear-gradient(135deg, transparent 50%, rgba(232,56,58,0.15) 50%)" } })
        )
      )
    )
  );
}

function Slide4() {
  return h("div", { style: { maxWidth: 820, width: "100%" } },
    h(Label, { text: "Nuestra ventaja" }),
    h(BigTitle, null, "¿POR QUÉ DUKO LÁSER?"),
    h("div", { style: { display: "flex", flexDirection: "column", gap: 14 } },
      ...reasons.map((r, i) =>
        h("div", { key: i, style: { display: "flex", alignItems: "flex-start", gap: 20, background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: "18px 22px" } },
          h("div", { style: { fontFamily: "'Bebas Neue', serif", fontSize: 36, fontWeight: 900, color: ACCENT, lineHeight: 1, minWidth: 36 } }, r.num),
          h("div", null,
            h("div", { style: { fontSize: 14, fontWeight: 700, marginBottom: 5 } }, r.title),
            h("div", { style: { fontSize: 12, color: GRAY, lineHeight: 1.6 } }, r.desc)
          )
        )
      )
    )
  );
}

function Slide5() {
  return h("div", { style: { textAlign: "center", maxWidth: 680, position: "relative" } },
    h("div", { style: { position: "absolute", width: 400, height: 400, borderRadius: "50%", background: "radial-gradient(circle, rgba(232,56,58,0.1) 0%, transparent 70%)", top: "50%", left: "50%", transform: "translate(-50%,-50%)", zIndex: 0, pointerEvents: "none" } }),
    h("div", { style: { position: "relative", zIndex: 1 } },
      h(Label, { text: "Hablemos" }),
      h("div", { style: { fontFamily: "'Bebas Neue', Georgia, serif", fontSize: "clamp(52px,8vw,88px)", fontWeight: 900, lineHeight: 1, marginBottom: 12 } },
        "HAGÁMOSLO", h("br"), h("span", { style: { color: ACCENT } }, "REALIDAD")
      ),
      h("p", { style: { fontSize: 14, color: GRAY, marginBottom: 36, lineHeight: 1.7 } },
        "Estamos listos para ser parte de su proyecto desde el primer día.", h("br"), "Contacte a su asesor comercial."
      ),
      h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, maxWidth: 460, margin: "0 auto" } },
        h("a", { href: "https://wa.me/50495224382", target: "_blank", style: { textDecoration: "none" } },
          h("div", { style: { background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: "20px 16px", cursor: "pointer" } },
            h("div", { style: { fontSize: 24, marginBottom: 8 } }, "📱"),
            h("div", { style: { fontSize: 10, textTransform: "uppercase", letterSpacing: 2, color: GRAY, marginBottom: 4 } }, "WhatsApp"),
            h("div", { style: { fontSize: 13, fontWeight: 700, color: ACCENT } }, "+504 9522-4382")
          )
        ),
        h("a", { href: "https://www.instagram.com/dukolaser", target: "_blank", style: { textDecoration: "none" } },
          h("div", { style: { background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: "20px 16px", cursor: "pointer" } },
            h("div", { style: { fontSize: 24, marginBottom: 8 } }, "📸"),
            h("div", { style: { fontSize: 10, textTransform: "uppercase", letterSpacing: 2, color: GRAY, marginBottom: 4 } }, "Instagram"),
            h("div", { style: { fontSize: 13, fontWeight: 700, color: ACCENT } }, "@dukolaser")
          )
        )
      ),
      h("div", { style: { marginTop: 24, fontSize: 12, color: GRAY } },
        "Asesor: ", h("strong", { style: { color: WHITE } }, "Alejandro Hernández")
      )
    )
  );
}

const slideComponents = [Slide1, Slide2, Slide3, Slide4, Slide5];
const TOTAL = slideComponents.length;

function App() {
  const [current, setCurrent] = useState(0);
  const [visible, setVisible] = useState(0);
  const [fading, setFading] = useState(false);

  const goTo = useCallback((n) => {
    if (fading) return;
    const next = ((n % TOTAL) + TOTAL) % TOTAL;
    if (next === current) return;
    setFading(true);
    setTimeout(() => {
      setCurrent(next);
      setVisible(next);
      setFading(false);
    }, 300);
  }, [current, fading]);

  useEffect(() => {
    const fn = (e) => {
      if (e.key === "ArrowRight" || e.key === " ") goTo(current + 1);
      if (e.key === "ArrowLeft") goTo(current - 1);
    };
    window.addEventListener("keydown", fn);
    return () => window.removeEventListener("keydown", fn);
  }, [current, goTo]);

  const SlideComp = slideComponents[visible];

  return h("div", {
    style: { width: "100vw", height: "100vh", background: DARK, color: WHITE, position: "relative", overflow: "hidden", fontFamily: "'DM Sans','Segoe UI',sans-serif" }
  },
    // Progress bar
    h("div", { style: { position: "fixed", top: 0, left: 0, height: 3, zIndex: 200, background: `linear-gradient(90deg, ${ACCENT}, ${ACCENT2})`, width: `${((current + 1) / TOTAL) * 100}%`, transition: "width 0.5s ease" } }),

    // Slide number
    h("div", { style: { position: "fixed", top: 16, left: 24, zIndex: 100, fontFamily: "'Bebas Neue', serif", fontSize: 56, fontWeight: 900, color: "rgba(255,255,255,0.04)", userSelect: "none" } },
      String(current + 1).padStart(2, "0")
    ),

    // Hint
    h("div", { style: { position: "fixed", top: 20, right: 24, zIndex: 100, fontFamily: "monospace", fontSize: 10, color: GRAY, letterSpacing: 1, display: "flex", gap: 6, alignItems: "center" } },
      h("span", { style: { border: `1px solid ${BORDER}`, borderRadius: 4, padding: "2px 6px" } }, "←"),
      h("span", { style: { border: `1px solid ${BORDER}`, borderRadius: 4, padding: "2px 6px" } }, "→"),
      h("span", { style: { marginLeft: 4 } }, "navegar")
    ),

    // Slide content
    h("div", {
      style: {
        position: "absolute", inset: 0, zIndex: 10,
        display: "flex", alignItems: "center", justifyContent: "center",
        padding: "40px 60px",
        opacity: fading ? 0 : 1,
        transform: fading ? "translateY(12px)" : "translateY(0)",
        transition: "opacity 0.3s ease, transform 0.3s ease",
      }
    }, h(SlideComp)),

    // Nav bar
    h("div", {
      style: {
        position: "fixed", bottom: 28, left: "50%", transform: "translateX(-50%)",
        display: "flex", alignItems: "center", gap: 14, zIndex: 200,
        background: "rgba(13,13,20,0.9)", backdropFilter: "blur(20px)",
        border: `1px solid ${BORDER}`, borderRadius: 50, padding: "10px 22px",
      }
    },
      h("button", {
        onClick: () => goTo(current - 1),
        style: { width: 36, height: 36, borderRadius: "50%", border: `1.5px solid ${BORDER}`, background: "transparent", color: WHITE, fontSize: 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s", lineHeight: 1 }
      }, "←"),
      h("div", { style: { display: "flex", gap: 7, alignItems: "center" } },
        ...Array.from({ length: TOTAL }, (_, i) =>
          h("div", {
            key: i,
            onClick: () => goTo(i),
            style: { height: 6, borderRadius: 3, cursor: "pointer", background: i === current ? ACCENT : GRAY, width: i === current ? 20 : 6, transition: "all 0.3s" }
          })
        )
      ),
      h("div", { style: { fontFamily: "monospace", fontSize: 11, color: GRAY, letterSpacing: 1, minWidth: 36, textAlign: "center" } },
        `${current + 1} / ${TOTAL}`
      ),
      h("button", {
        onClick: () => goTo(current + 1),
        style: { width: 36, height: 36, borderRadius: "50%", border: `1.5px solid ${BORDER}`, background: "transparent", color: WHITE, fontSize: 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s", lineHeight: 1 }
      }, "→")
    )
  );
}

// Inject CSS animation
const style = document.createElement("style");
style.textContent = `@keyframes pulseLine { 0%,100%{opacity:0.4;height:50px} 50%{opacity:1;height:70px} }`;
document.head.appendChild(style);

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
